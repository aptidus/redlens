<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>RedLens Settings</title>
  <style>
    :root {
      --bg: #080809;
      --bg-1: #111114;
      --bg-2: #18181c;
      --border: #2a2a30;
      --text: #f5f5f7;
      --text-2: #a8a8b0;
      --text-3: #6a6a72;
      --red: #e51a28;
      --green: #3ecf8e;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      font-size: 14px;
      min-height: 100vh;
    }
    .wrap {
      max-width: 480px;
      margin: 60px auto;
      padding: 32px;
      background: var(--bg-1);
      border: 1px solid var(--border);
      border-radius: 12px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }
    h1 { font-size: 20px; font-weight: 700; letter-spacing: -0.01em; }
    label { display: block; font-size: 12px; color: var(--text-3); letter-spacing: 0.06em; text-transform: uppercase; margin-bottom: 8px; font-family: ui-monospace, SFMono-Regular, Menlo, monospace; }
    input[type="text"] {
      width: 100%;
      background: var(--bg-2);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 10px 12px;
      color: var(--text);
      font-size: 14px;
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      outline: none;
    }
    input[type="text"]:focus { border-color: var(--red); }
    button {
      background: var(--red);
      color: #fff;
      border: none;
      border-radius: 6px;
      padding: 10px 18px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      font-size: 14px;
      align-self: flex-start;
    }
    .hint { font-size: 12px; color: var(--text-3); line-height: 1.5; }
    .saved { font-size: 12px; color: var(--green); font-family: ui-monospace, SFMono-Regular, Menlo, monospace; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>RedLens Connect — Settings</h1>
    <div>
      <label for="url">RedLens URL</label>
      <input type="text" id="url" placeholder="https://redlens-production.up.railway.app" />
      <p class="hint" style="margin-top: 8px;">Where the extension sends your cookie when you click "Connect to RedLens". Leave blank to use the default.</p>
    </div>
    <div style="display: flex; align-items: center; gap: 12px;">
      <button id="save">Save</button>
      <span class="saved" id="saved"></span>
    </div>
  </div>
  <script src="options.js"></script>
</body>
</html>
