<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>RedLens Cookie Grabber</title>
  <style>
    :root {
      --bg: #080809;
      --bg-1: #111114;
      --bg-2: #18181c;
      --border: #2a2a30;
      --text: #f5f5f7;
      --text-2: #a8a8b0;
      --text-3: #6a6a72;
      --red: #e51a28;
      --green: #3ecf8e;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 320px;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      font-size: 13px;
    }
    .wrap { padding: 16px; display: flex; flex-direction: column; gap: 12px; }
    .header {
      display: flex; align-items: center; gap: 8px;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--border);
    }
    .lens {
      width: 22px; height: 22px;
      border: 1.5px solid var(--red);
      border-radius: 50%;
      position: relative;
    }
    .lens::after {
      content: "";
      position: absolute;
      inset: 30%;
      border-radius: 50%;
      background: var(--red);
    }
    .title { font-weight: 700; letter-spacing: -0.01em; }
    .status {
      padding: 10px 12px;
      background: var(--bg-1);
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 12px;
      color: var(--text-2);
      line-height: 1.5;
      min-height: 36px;
    }
    .status.ok { border-color: rgba(62,207,142,0.3); background: rgba(62,207,142,0.06); color: var(--green); }
    .status.err { border-color: rgba(229,26,40,0.3); background: rgba(229,26,40,0.06); color: var(--red); }
    button {
      background: var(--red);
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 12px 14px;
      font-weight: 600;
      font-size: 13px;
      cursor: pointer;
      font-family: inherit;
      transition: opacity 0.15s;
    }
    button:hover { opacity: 0.92; }
    button:disabled { opacity: 0.4; cursor: not-allowed; }
    .meta {
      font-size: 11px;
      color: var(--text-3);
      line-height: 1.5;
    }
    .meta strong { color: var(--text-2); }
    code {
      background: var(--bg-2);
      padding: 1px 5px;
      border-radius: 3px;
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      font-size: 11px;
      color: var(--text);
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="header">
      <div class="lens"></div>
      <div class="title">RedLens Cookie Grabber</div>
    </div>
    <div id="status" class="status">Reading xiaohongshu.com cookies…</div>
    <button id="copy" disabled>Copy cookie to clipboard</button>
    <div class="meta" id="meta"></div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
